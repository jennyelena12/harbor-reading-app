name: Harbor
options:
  bundleIdPrefix: com.harbor
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug

targets:
  Harbor:
    type: application
    platform: iOS
    sources:
      - path: Harbor
        createIntermediateGroups: true
    resources:
      - path: Harbor/Info.plist
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.harbor.app
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_STYLE: Automatic
      SWIFT_VERSION: "5.9"
      IPHONEOS_DEPLOYMENT_TARGET: "17.0"
      TARGETED_DEVICE_FAMILY: "1"
      INFOPLIST_FILE: Harbor/Info.plist
      GENERATE_INFOPLIST_FILE: false
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    capabilities:
      - Microphone
      - Camera
    dependencies: []
    scheme:
      testTargets: []
      gatherCoverageData: false

schemes:
  Harbor:
    build:
      targets:
        Harbor: all
    run:
      config: Debug
    archive:
      config: Release

